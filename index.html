<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>つぶやき下書き</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #191919;
      --surface: #222222;
      --surface2: #2a2a2a;
      --border: #333333;
      --blue: #3b82f6;
      --blue-hover: #2563eb;
      --blue-dim: rgba(59, 130, 246, 0.15);
      --text: #e4e4e7;
      --text-muted: #71717a;
      --text-placeholder: #52525b;
      --danger: #ef4444;
      --warning: #f59e0b;
      --radius: 10px;
    }

    html, body {
      width: 450px;
      height: 450px;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
      font-size: 13px;
    }

    .widget {
      width: 450px;
      height: 450px;
      display: flex;
      flex-direction: column;
      padding: 16px;
      gap: 10px;
    }

    /* ── ヘッダー ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-icon {
      width: 26px;
      height: 26px;
      background: var(--blue);
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .header-icon svg {
      width: 14px;
      height: 14px;
      fill: #fff;
    }

    .header-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.01em;
    }

    .draft-count {
      font-size: 11px;
      color: var(--text-muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2px 8px;
    }

    /* ── タブ ── */
    .tabs {
      display: flex;
      gap: 4px;
      background: var(--surface2);
      border-radius: 8px;
      padding: 3px;
      flex-shrink: 0;
    }

    .tab {
      flex: 1;
      padding: 5px 0;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 500;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .tab.active {
      background: var(--blue);
      color: #fff;
    }

    .tab:not(.active):hover {
      color: var(--text);
      background: var(--border);
    }

    /* ── 入力エリア（作成タブ） ── */
    .compose-area {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
      min-height: 0;
    }

    .textarea-wrap {
      position: relative;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    textarea {
      width: 100%;
      flex: 1;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 14px;
      line-height: 1.6;
      padding: 12px 14px;
      resize: none;
      outline: none;
      transition: border-color 0.15s ease;
      font-family: inherit;
    }

    textarea::placeholder {
      color: var(--text-placeholder);
    }

    textarea:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px var(--blue-dim);
    }

    /* ── 文字数カウンター ── */
    .counter-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .char-counter {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .counter-ring {
      position: relative;
      width: 22px;
      height: 22px;
    }

    .counter-ring svg {
      transform: rotate(-90deg);
    }

    .counter-ring .track {
      fill: none;
      stroke: var(--border);
      stroke-width: 2.5;
    }

    .counter-ring .fill {
      fill: none;
      stroke: var(--blue);
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-dasharray: 56.5;
      stroke-dashoffset: 56.5;
      transition: stroke-dashoffset 0.2s ease, stroke 0.2s ease;
    }

    .counter-text {
      font-size: 12px;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
    }

    .counter-text.warn { color: var(--warning); }
    .counter-text.over { color: var(--danger); }

    .action-btns {
      display: flex;
      gap: 6px;
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 6px 12px;
      border-radius: 7px;
      border: none;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
      font-family: inherit;
    }

    .btn svg {
      width: 13px;
      height: 13px;
      flex-shrink: 0;
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover {
      background: var(--surface2);
      color: var(--text);
    }

    .btn-primary {
      background: var(--blue);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--blue-hover);
    }

    .btn-primary:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* ── 下書き一覧タブ ── */
    .drafts-area {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-height: 0;
    }

    .drafts-area::-webkit-scrollbar {
      width: 4px;
    }

    .drafts-area::-webkit-scrollbar-track {
      background: transparent;
    }

    .drafts-area::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--text-placeholder);
      padding: 20px 0;
    }

    .empty-state svg {
      width: 32px;
      height: 32px;
      opacity: 0.4;
    }

    .empty-state p {
      font-size: 12px;
    }

    .draft-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .draft-card:hover {
      border-color: var(--blue);
      background: var(--surface2);
    }

    .draft-body {
      font-size: 13px;
      line-height: 1.5;
      color: var(--text);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .draft-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .draft-time {
      font-size: 11px;
      color: var(--text-placeholder);
    }

    .draft-chars {
      font-size: 11px;
      color: var(--text-muted);
    }

    .draft-actions {
      display: flex;
      gap: 4px;
      opacity: 0;
      transition: opacity 0.15s ease;
    }

    .draft-card:hover .draft-actions {
      opacity: 1;
    }

    .icon-btn {
      width: 22px;
      height: 22px;
      border: none;
      background: var(--surface2);
      border-radius: 5px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      transition: all 0.15s ease;
    }

    .icon-btn:hover {
      background: var(--blue-dim);
      color: var(--blue);
    }

    .icon-btn.danger:hover {
      background: rgba(239, 68, 68, 0.15);
      color: var(--danger);
    }

    .icon-btn svg {
      width: 11px;
      height: 11px;
    }

    /* ── トースト ── */
    .toast {
      position: fixed;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: var(--surface2);
      border: 1px solid var(--blue);
      color: var(--text);
      font-size: 12px;
      padding: 7px 14px;
      border-radius: 20px;
      opacity: 0;
      transition: all 0.2s ease;
      pointer-events: none;
      white-space: nowrap;
      z-index: 100;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── パネル表示切替 ── */
    .panel { display: none; }
    .panel.active { display: flex; flex-direction: column; flex: 1; min-height: 0; gap: 8px; }
  </style>
</head>
<body>
<div class="widget">

  <!-- ヘッダー -->
  <div class="header">
    <div class="header-left">
      <div class="header-icon">
        <!-- pencil icon -->
        <svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
          <path d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.379-2.83-2.828z"/>
        </svg>
      </div>
      <span class="header-title">つぶやき下書き</span>
    </div>
    <span class="draft-count" id="draftCount">0 件</span>
  </div>

  <!-- タブ -->
  <div class="tabs">
    <button class="tab active" id="tabCompose" onclick="switchTab('compose')">作成</button>
    <button class="tab" id="tabDrafts" onclick="switchTab('drafts')">下書き一覧</button>
  </div>

  <!-- 作成パネル -->
  <div class="panel active" id="panelCompose">
    <div class="compose-area">
      <div class="textarea-wrap">
        <textarea
          id="tweetInput"
          placeholder="今、何を思ってる？（280文字以内）"
          maxlength="560"
          oninput="onInput()"
        ></textarea>
      </div>
      <div class="counter-row">
        <div class="char-counter">
          <div class="counter-ring">
            <svg viewBox="0 0 22 22" width="22" height="22">
              <circle class="track" cx="11" cy="11" r="9"/>
              <circle class="fill" id="counterFill" cx="11" cy="11" r="9"/>
            </svg>
          </div>
          <span class="counter-text" id="counterText">280</span>
        </div>
        <div class="action-btns">
          <button class="btn btn-ghost" onclick="clearInput()">
            <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/></svg>
            クリア
          </button>
          <button class="btn btn-ghost" id="copyBtn" onclick="copyText()">
            <svg viewBox="0 0 20 20" fill="currentColor"><path d="M8 3a1 1 0 011-1h2a1 1 0 110 2H9a1 1 0 01-1-1z"/><path d="M6 3a2 2 0 00-2 2v11a2 2 0 002 2h8a2 2 0 002-2V5a2 2 0 00-2-2 3 3 0 01-3 3H9a3 3 0 01-3-3z"/></svg>
            コピー
          </button>
          <button class="btn btn-primary" id="saveBtn" onclick="saveDraft()" disabled>
            <svg viewBox="0 0 20 20" fill="currentColor"><path d="M7.707 10.293a1 1 0 10-1.414 1.414l3 3a1 1 0 001.414 0l3-3a1 1 0 00-1.414-1.414L11 11.586V6h5a2 2 0 012 2v7a2 2 0 01-2 2H4a2 2 0 01-2-2V8a2 2 0 012-2h5v5.586l-1.293-1.293zM9 4a1 1 0 012 0v2H9V4z"/></svg>
            保存
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- 下書き一覧パネル -->
  <div class="panel" id="panelDrafts">
    <div class="drafts-area" id="draftsList"></div>
  </div>

</div>

<!-- トースト -->
<div class="toast" id="toast"></div>

<script>
  const MAX = 280;
  const STORE_KEY = 'notion_tweet_drafts';
  let drafts = [];

  // ── 初期化 ──
  function init() {
    try {
      const raw = localStorage.getItem(STORE_KEY);
      if (raw) drafts = JSON.parse(raw);
    } catch (e) {
      drafts = [];
    }
    renderDrafts();
    updateCount();
  }

  // ── タブ切替 ──
  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('tab' + (tab === 'compose' ? 'Compose' : 'Drafts')).classList.add('active');
    document.getElementById('panel' + (tab === 'compose' ? 'Compose' : 'Drafts')).classList.add('active');
    if (tab === 'drafts') renderDrafts();
  }

  // ── 入力監視 ──
  function onInput() {
    const val = document.getElementById('tweetInput').value;
    const len = [...val].length; // サロゲートペア対応
    const remaining = MAX - len;
    const ratio = Math.min(len / MAX, 1);
    const circumference = 56.5;

    // リング更新
    const fill = document.getElementById('counterFill');
    fill.style.strokeDashoffset = circumference * (1 - ratio);

    if (len > MAX * 0.9) {
      fill.style.stroke = len > MAX ? 'var(--danger)' : 'var(--warning)';
    } else {
      fill.style.stroke = 'var(--blue)';
    }

    // テキスト
    const ct = document.getElementById('counterText');
    ct.textContent = remaining;
    ct.className = 'counter-text' + (remaining < 0 ? ' over' : remaining < 28 ? ' warn' : '');

    // ボタン
    document.getElementById('saveBtn').disabled = len === 0;
    document.getElementById('copyBtn').disabled = len === 0;
  }

  // ── クリア ──
  function clearInput() {
    document.getElementById('tweetInput').value = '';
    onInput();
  }

  // ── コピー ──
  async function copyText() {
    const val = document.getElementById('tweetInput').value.trim();
    if (!val) return;
    try {
      await navigator.clipboard.writeText(val);
      showToast('クリップボードにコピーしました');
    } catch {
      showToast('コピーできませんでした');
    }
  }

  // ── 保存 ──
  function saveDraft() {
    const val = document.getElementById('tweetInput').value.trim();
    if (!val) return;
    const len = [...val].length;
    if (len > MAX) {
      showToast(`${len - MAX}文字オーバーしています`);
      return;
    }
    drafts.unshift({ id: Date.now(), text: val, createdAt: new Date().toISOString() });
    persist();
    clearInput();
    updateCount();
    showToast('下書きを保存しました');
  }

  // ── 下書きレンダリング ──
  function renderDrafts() {
    const list = document.getElementById('draftsList');
    if (drafts.length === 0) {
      list.innerHTML = `
        <div class="empty-state">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/>
          </svg>
          <p>保存した下書きはここに表示されます</p>
        </div>`;
      return;
    }
    list.innerHTML = drafts.map(d => {
      const len = [...d.text].length;
      const timeStr = formatTime(d.createdAt);
      return `
        <div class="draft-card" onclick="loadDraft(${d.id})">
          <div class="draft-body">${escapeHtml(d.text)}</div>
          <div class="draft-meta">
            <span class="draft-time">${timeStr}</span>
            <div style="display:flex;align-items:center;gap:8px">
              <span class="draft-chars">${len}字</span>
              <div class="draft-actions" onclick="event.stopPropagation()">
                <button class="icon-btn" title="コピー" onclick="copyDraft(${d.id})">
                  <svg viewBox="0 0 20 20" fill="currentColor"><path d="M8 3a1 1 0 011-1h2a1 1 0 110 2H9a1 1 0 01-1-1z"/><path d="M6 3a2 2 0 00-2 2v11a2 2 0 002 2h8a2 2 0 002-2V5a2 2 0 00-2-2 3 3 0 01-3 3H9a3 3 0 01-3-3z"/></svg>
                </button>
                <button class="icon-btn danger" title="削除" onclick="deleteDraft(${d.id})">
                  <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd"/></svg>
                </button>
              </div>
            </div>
          </div>
        </div>`;
    }).join('');
  }

  // ── 下書きを作成エリアに読み込む ──
  function loadDraft(id) {
    const d = drafts.find(x => x.id === id);
    if (!d) return;
    document.getElementById('tweetInput').value = d.text;
    onInput();
    switchTab('compose');
  }

  // ── 下書きをコピー ──
  async function copyDraft(id) {
    const d = drafts.find(x => x.id === id);
    if (!d) return;
    try {
      await navigator.clipboard.writeText(d.text);
      showToast('コピーしました');
    } catch {
      showToast('コピーできませんでした');
    }
  }

  // ── 下書き削除 ──
  function deleteDraft(id) {
    drafts = drafts.filter(d => d.id !== id);
    persist();
    updateCount();
    renderDrafts();
    showToast('削除しました');
  }

  // ── 永続化 ──
  function persist() {
    try {
      localStorage.setItem(STORE_KEY, JSON.stringify(drafts));
    } catch (e) { /* quota exceeded etc */ }
  }

  // ── 件数更新 ──
  function updateCount() {
    document.getElementById('draftCount').textContent = `${drafts.length} 件`;
  }

  // ── 時刻フォーマット ──
  function formatTime(iso) {
    const d = new Date(iso);
    const now = new Date();
    const diffMs = now - d;
    const diffMin = Math.floor(diffMs / 60000);
    if (diffMin < 1) return 'たった今';
    if (diffMin < 60) return `${diffMin}分前`;
    const diffH = Math.floor(diffMin / 60);
    if (diffH < 24) return `${diffH}時間前`;
    const mm = String(d.getMonth() + 1).padStart(2, '0');
    const dd = String(d.getDate()).padStart(2, '0');
    const hh = String(d.getHours()).padStart(2, '0');
    const mn = String(d.getMinutes()).padStart(2, '0');
    return `${mm}/${dd} ${hh}:${mn}`;
  }

  // ── HTML エスケープ ──
  function escapeHtml(str) {
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  // ── トースト ──
  let toastTimer;
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
  }

  init();
</script>
</body>
</html>
