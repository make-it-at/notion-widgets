<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>マインドマップ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #fff;
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      max-width: 450px;
      max-height: 450px;
      margin: 0 auto;
    }

    .toolbar {
      display: flex;
      gap: 6px;
      padding: 6px 8px;
      background: #f8f9fa;
      border-bottom: 1px solid #e0e0e0;
      flex-shrink: 0;
      justify-content: center;
      flex-wrap: wrap;
    }

    button {
      padding: 5px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      font-family: inherit;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }
    button:active { transform: scale(0.97); }

    .btn-add   { background: #e8f0fe; color: #1a73e8; }
    .btn-add:hover   { background: #d2e3fc; }
    .btn-save  { background: #e6f4ea; color: #137333; }
    .btn-save:hover  { background: #ceead6; }
    .btn-reset { background: #fce8e6; color: #c5221f; }
    .btn-reset:hover { background: #f5c6c3; }

    .hint {
      font-size: 10px;
      color: #9aa0a6;
      padding: 3px 8px;
      text-align: center;
      flex-shrink: 0;
      background: #fafafa;
      border-bottom: 1px solid #f0f0f0;
      white-space: nowrap;
      overflow: hidden;
    }

    .canvas-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    canvas { display: block; }

    #editInput {
      position: absolute;
      border: 2px solid #1a73e8;
      border-radius: 6px;
      padding: 3px 8px;
      font-size: 12px;
      font-family: inherit;
      outline: none;
      background: #fff;
      z-index: 10;
      display: none;
      text-align: center;
      box-shadow: 0 2px 8px rgba(26,115,232,0.3);
    }
  </style>
</head>
<body>

<div class="toolbar">
  <button class="btn-add"   id="btnAdd">＋ 子ノード</button>
  <button class="btn-save"  id="btnPng">📷 PNG保存</button>
  <button class="btn-reset" id="btnReset">↺ リセット</button>
</div>
<div class="hint">クリック：選択　ダブルクリック：編集　ノードドラッグ：移動　空白ドラッグ：スクロール</div>

<div class="canvas-wrap" id="wrap">
  <canvas id="canvas"></canvas>
  <input id="editInput" type="text">
</div>

<script>
// ─── 定数 ─────────────────────────────────────────────────
const NODE_H  = 34;
const ANIM_MS = 280;
const DX_BASE = 130;
const DY_GAP  = 56;

const COLORS = [
  { bg: '#1a73e8', fg: '#fff' },
  { bg: '#0b57d0', fg: '#fff' },
  { bg: '#1e7e34', fg: '#fff' },
  { bg: '#e37400', fg: '#fff' },
  { bg: '#a50e0e', fg: '#fff' },
  { bg: '#6200ea', fg: '#fff' },
];

// ─── 状態 ─────────────────────────────────────────────────
let nodes      = [];
let nextId     = 2;
let selectedId = null;
let editingId  = null;
let anims      = [];
let rafId      = null;

// パン用
let view      = { x: 0, y: 0 };
let isPanning = false;
let panStart  = null;

// ノードドラッグ用
let drag     = null;   // { node, ox, oy }
let downPos  = null;
let hasMoved = false;

// ─── DOM ──────────────────────────────────────────────────
const wrap      = document.getElementById('wrap');
const canvas    = document.getElementById('canvas');
const ctx       = canvas.getContext('2d');
const editInput = document.getElementById('editInput');
const DPR       = window.devicePixelRatio || 1;

// ─── 座標変換 ─────────────────────────────────────────────
function toScreen(wx, wy) { return { x: wx + view.x, y: wy + view.y }; }
function toWorld(sx, sy)  { return { x: sx - view.x, y: sy - view.y }; }

// ─── リサイズ ─────────────────────────────────────────────
function resize() {
  const r = wrap.getBoundingClientRect();
  canvas.width        = r.width  * DPR;
  canvas.height       = r.height * DPR;
  canvas.style.width  = r.width  + 'px';
  canvas.style.height = r.height + 'px';
  draw();
}
window.addEventListener('resize', resize);

// ─── ユーティリティ ───────────────────────────────────────
function level(id) {
  const n = nodes.find(n => n.id === id);
  return (!n || n.parent === null) ? 0 : 1 + level(n.parent);
}

function getColor(id) {
  return COLORS[Math.min(level(id), COLORS.length - 1)];
}

function nodeW(node, c) {
  const lv = level(node.id);
  const cc = c || ctx;
  cc.font = lv === 0
    ? 'bold 13px -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif'
    : '12px -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif';
  return Math.max(72, cc.measureText(node.text).width + 28);
}

function hit(wx, wy) {
  for (let i = nodes.length - 1; i >= 0; i--) {
    const n = nodes[i];
    const w = nodeW(n);
    if (wx >= n.x - w/2 && wx <= n.x + w/2 &&
        wy >= n.y - NODE_H/2 && wy <= n.y + NODE_H/2) return n;
  }
  return null;
}

function animScale(id) {
  const a = anims.find(a => a.id === id);
  if (!a) return 1;
  const t = Math.min((Date.now() - a.t0) / ANIM_MS, 1);
  if (t >= 1) { anims = anims.filter(x => x.id !== id); return 1; }
  return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2;
}

// ─── 描画 ─────────────────────────────────────────────────
function draw() {
  const W = canvas.width / DPR;
  const H = canvas.height / DPR;

  ctx.save();
  ctx.scale(DPR, DPR);
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, W, H);
  ctx.translate(view.x, view.y);

  nodes.forEach(n => {
    if (n.parent === null) return;
    const p = nodes.find(x => x.id === n.parent);
    if (p) drawEdge(ctx, p, n);
  });

  nodes.forEach(n => drawNode(ctx, n, n.id === selectedId));

  ctx.restore();

  if (anims.length > 0) rafId = requestAnimationFrame(draw);
}

function drawEdge(c, from, to) {
  const fw = nodeW(from, c), tw = nodeW(to, c);
  const right = to.x >= from.x;
  const x1 = from.x + (right ?  fw/2 : -fw/2);
  const x2 = to.x   + (right ? -tw/2 :  tw/2);
  const cx  = (x1 + x2) / 2;
  c.beginPath();
  c.moveTo(x1, from.y);
  c.bezierCurveTo(cx, from.y, cx, to.y, x2, to.y);
  c.strokeStyle = '#c5cae9';
  c.lineWidth   = 1.5;
  c.stroke();
}

function drawNode(c, node, selected) {
  const w   = nodeW(node, c);
  const sc  = animScale(node.id);
  const col = getColor(node.id);
  const lv  = level(node.id);

  c.save();
  c.translate(node.x, node.y);
  c.scale(sc, sc);

  c.shadowColor   = selected ? 'rgba(26,115,232,0.45)' : 'rgba(0,0,0,0.12)';
  c.shadowBlur    = selected ? 10 : 5;
  c.shadowOffsetY = 2;

  c.beginPath();
  c.roundRect(-w/2, -NODE_H/2, w, NODE_H, 9);
  c.fillStyle = col.bg;
  c.fill();

  if (selected) {
    c.shadowBlur  = 0;
    c.strokeStyle = 'rgba(255,255,255,0.75)';
    c.lineWidth   = 2;
    c.stroke();
  }

  c.shadowColor = 'transparent';
  c.shadowBlur  = 0;

  c.fillStyle    = col.fg;
  c.font         = lv === 0
    ? 'bold 13px -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif'
    : '12px -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif';
  c.textAlign    = 'center';
  c.textBaseline = 'middle';
  c.fillText(node.text, 0, 0);

  c.restore();
}

// ─── ノード追加 ───────────────────────────────────────────
function addChild() {
  const parent = nodes.find(n => n.id === selectedId);
  if (!parent) { alert('ノードを選択してください'); return; }

  const lv       = level(parent.id);
  const siblings = nodes.filter(n => n.parent === parent.id);

  let goRight;
  if (parent.parent === null) {
    const rCount = siblings.filter(n => n.x > parent.x).length;
    const lCount = siblings.filter(n => n.x < parent.x).length;
    goRight = rCount <= lCount;
  } else {
    const gp = nodes.find(n => n.id === parent.parent);
    goRight  = gp ? parent.x >= gp.x : true;
  }

  const sameSide = siblings.filter(n => goRight ? n.x > parent.x : n.x <= parent.x);
  const idx      = sameSide.length;
  const dy       = idx === 0 ? 0
    : (idx % 2 === 1 ? Math.ceil(idx/2) : -Math.floor(idx/2)) * DY_GAP;
  const dx       = Math.max(DX_BASE - lv * 15, 80);

  const id = nextId++;
  nodes.push({
    id,
    parent: parent.id,
    x: parent.x + (goRight ? dx : -dx),
    y: parent.y + dy,
    text: 'ノード',
  });

  anims.push({ id, t0: Date.now() });
  selectedId = id;
  save();
  cancelAnimationFrame(rafId);
  rafId = requestAnimationFrame(draw);
}

// ─── 永続化 ───────────────────────────────────────────────
function save() {
  localStorage.setItem('mm2_nodes',  JSON.stringify(nodes));
  localStorage.setItem('mm2_nextId', String(nextId));
  localStorage.setItem('mm2_view',   JSON.stringify(view));
}

function loadSaved() {
  const raw = localStorage.getItem('mm2_nodes');
  if (!raw) return false;
  nodes      = JSON.parse(raw);
  nextId     = parseInt(localStorage.getItem('mm2_nextId') || '2', 10);
  const sv   = localStorage.getItem('mm2_view');
  view       = sv ? JSON.parse(sv) : { x: 0, y: 0 };
  selectedId = nodes[0]?.id ?? null;
  return true;
}

function initDefault() {
  nodes      = [{ id: 1, parent: null, x: 0, y: 0, text: 'メインテーマ' }];
  nextId     = 2;
  selectedId = 1;
  const r    = wrap.getBoundingClientRect();
  view       = { x: r.width / 2, y: r.height / 2 };
  save();
}

// ─── PNG エクスポート ─────────────────────────────────────
function exportPng() {
  const pad = 48, sc = 2;
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  nodes.forEach(n => {
    const w = nodeW(n);
    minX = Math.min(minX, n.x - w/2);  minY = Math.min(minY, n.y - NODE_H/2);
    maxX = Math.max(maxX, n.x + w/2);  maxY = Math.max(maxY, n.y + NODE_H/2);
  });

  const off  = document.createElement('canvas');
  off.width  = (maxX - minX + pad*2) * sc;
  off.height = (maxY - minY + pad*2) * sc;
  const oc   = off.getContext('2d');
  oc.scale(sc, sc);
  oc.translate(-minX + pad, -minY + pad);
  oc.fillStyle = '#fff';
  oc.fillRect(minX - pad, minY - pad, maxX - minX + pad*2, maxY - minY + pad*2);

  nodes.forEach(n => {
    if (n.parent === null) return;
    const p = nodes.find(x => x.id === n.parent);
    if (p) drawEdge(oc, p, n);
  });
  nodes.forEach(n => drawNode(oc, n, false));

  const a = document.createElement('a');
  a.download = 'mindmap.png';
  a.href = off.toDataURL('image/png');
  a.click();
}

// ─── ポインタ位置 ─────────────────────────────────────────
function pointerPos(e) {
  const r = canvas.getBoundingClientRect();
  if (e.touches) return { x: e.touches[0].clientX - r.left, y: e.touches[0].clientY - r.top };
  return { x: e.clientX - r.left, y: e.clientY - r.top };
}

// ─── マウス／タッチイベント ───────────────────────────────
function onDown(e) {
  if (editingId !== null) return;
  const { x, y } = pointerPos(e);
  const { x: wx, y: wy } = toWorld(x, y);
  const n = hit(wx, wy);

  downPos  = { x, y };
  hasMoved = false;

  if (n) {
    selectedId = n.id;
    drag = { node: n, ox: wx - n.x, oy: wy - n.y };
  } else {
    isPanning = true;
    panStart  = { x: x - view.x, y: y - view.y };
    selectedId = null;
  }
  draw();
}

function onMove(e) {
  const { x, y } = pointerPos(e);

  if (!hasMoved && downPos) {
    const dx = x - downPos.x, dy = y - downPos.y;
    if (dx*dx + dy*dy > 9) hasMoved = true;
  }
  if (!hasMoved) return;

  if (drag) {
    const { x: wx, y: wy } = toWorld(x, y);
    drag.node.x = wx - drag.ox;
    drag.node.y = wy - drag.oy;
    // 編集中のinputも追従
    if (editingId === drag.node.id) repositionInput(drag.node);
    draw();
  } else if (isPanning) {
    view.x = x - panStart.x;
    view.y = y - panStart.y;
    draw();
  }
}

function onUp() {
  if (drag && hasMoved) save();
  drag      = null;
  isPanning = false;
  downPos   = null;
}

canvas.addEventListener('mousedown',  onDown);
canvas.addEventListener('mousemove',  onMove);
canvas.addEventListener('mouseup',    onUp);
canvas.addEventListener('mouseleave', onUp);

// ダブルクリック：ネイティブイベントを使用
canvas.addEventListener('dblclick', e => {
  if (editingId !== null) return;
  const { x, y } = pointerPos(e);
  const { x: wx, y: wy } = toWorld(x, y);
  const n = hit(wx, wy);
  if (n) startEdit(n);
});

canvas.addEventListener('touchstart', e => { e.preventDefault(); onDown(e); }, { passive: false });
canvas.addEventListener('touchmove',  e => { e.preventDefault(); onMove(e); }, { passive: false });
canvas.addEventListener('touchend',   e => { e.preventDefault(); onUp();    }, { passive: false });

// ─── インライン編集 ───────────────────────────────────────
function repositionInput(node) {
  const w  = Math.max(nodeW(node), 90);
  const sc = toScreen(node.x, node.y);
  editInput.style.left   = (sc.x - w/2) + 'px';
  editInput.style.top    = (sc.y - NODE_H/2) + 'px';
  editInput.style.width  = w + 'px';
  editInput.style.height = NODE_H + 'px';
}

function startEdit(node) {
  editingId = node.id;
  repositionInput(node);
  editInput.style.display = 'block';
  editInput.value = node.text;
  // rAF でフォーカス：display:block の反映後に focus させる
  requestAnimationFrame(() => {
    editInput.focus();
    editInput.select();
  });
}

function finishEdit() {
  if (editingId === null) return;
  const node = nodes.find(n => n.id === editingId);
  if (node && editInput.value.trim()) node.text = editInput.value.trim();
  editInput.style.display = 'none';
  editingId = null;
  save();
  draw();
}

editInput.addEventListener('blur', finishEdit);
editInput.addEventListener('keydown', e => {
  if (e.key === 'Enter')  { e.preventDefault(); finishEdit(); }
  if (e.key === 'Escape') { editInput.style.display = 'none'; editingId = null; draw(); }
});

// ─── ボタン ───────────────────────────────────────────────
document.getElementById('btnAdd').addEventListener('click', addChild);
document.getElementById('btnPng').addEventListener('click', exportPng);
document.getElementById('btnReset').addEventListener('click', () => {
  if (!confirm('マインドマップをリセットしますか？')) return;
  ['mm2_nodes','mm2_nextId','mm2_view'].forEach(k => localStorage.removeItem(k));
  initDefault();
  draw();
});

// ─── 起動 ─────────────────────────────────────────────────
resize();
if (!loadSaved()) initDefault();
draw();
</script>
</body>
</html>
