<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quote Display</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Georgia', 'Yu Mincho', 'ヒラギノ明朝 ProN', serif;
    }

    .widget {
      max-width: 350px;
      max-height: 350px;
      width: 100%;
      height: 350px;
      background: #ffffff;
      border: 2px solid #2e7d32;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 28px 24px;
      position: relative;
      overflow: hidden;
    }

    .widget::before {
      content: '\201C';
      position: absolute;
      top: 8px;
      left: 16px;
      font-size: 72px;
      color: #a5d6a7;
      line-height: 1;
      font-family: Georgia, serif;
      pointer-events: none;
    }

    .widget::after {
      content: '\201D';
      position: absolute;
      bottom: 48px;
      right: 16px;
      font-size: 72px;
      color: #a5d6a7;
      line-height: 1;
      font-family: Georgia, serif;
      pointer-events: none;
    }

    .quote-text {
      font-size: 15px;
      line-height: 1.75;
      color: #1b5e20;
      text-align: center;
      z-index: 1;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.6s ease, transform 0.6s ease;
      max-height: 220px;
      overflow: hidden;
    }

    .quote-text.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .quote-author {
      margin-top: 20px;
      font-size: 12px;
      color: #388e3c;
      letter-spacing: 0.08em;
      text-align: center;
      z-index: 1;
      opacity: 0;
      transition: opacity 0.6s ease 0.2s;
    }

    .quote-author.visible {
      opacity: 1;
    }

    .author-name {
      font-weight: bold;
      font-size: 13px;
      color: #2e7d32;
    }

    .divider {
      width: 40px;
      height: 2px;
      background: #66bb6a;
      margin: 0 auto 8px;
      border-radius: 2px;
    }

    .next-update {
      position: absolute;
      bottom: 10px;
      right: 14px;
      font-size: 10px;
      color: #a5d6a7;
      font-family: sans-serif;
    }
  </style>
</head>
<body>
  <div class="widget">
    <p class="quote-text" id="quoteText"></p>
    <div class="quote-author" id="quoteAuthor">
      <div class="divider"></div>
      <span class="author-name" id="authorName"></span>
    </div>
    <span class="next-update" id="nextUpdate"></span>
  </div>

  <script>
    const QUOTES = [
      { text: "成功とは、情熱を失わずに失敗から失敗へと渡り歩けることである。", author: "ウィンストン・チャーチル" },
      { text: "想像力は知識より重要である。知識には限界があるが、想像力は世界を包む。", author: "アルベルト・アインシュタイン" },
      { text: "人生はどこかに行くためではなく、どこかにいるためにある。", author: "マシュー・アーノルド" },
      { text: "千里の道も一歩から。", author: "老子" },
      { text: "自分を信じることができれば、何でもできる。", author: "テオドア・ルーズベルト" },
      { text: "人は誰でも自分の主人であり、自分の運命の船長である。", author: "W・E・ヘンリー" },
      { text: "夢を見ることができれば、それを実現することもできる。", author: "ウォルト・ディズニー" },
      { text: "行動こそがすべてである。行動する人は少なく、語る人は多い。", author: "クレメント・ストーン" },
      { text: "最大の栄光は一度も失敗しないことではなく、失敗するたびに立ち上がることにある。", author: "孔子" },
      { text: "われわれは行動によって幸福になるのであり、休息によってではない。", author: "トマス・ア・ケンピス" },
      { text: "昨日から学び、今日のために生き、明日に希望を持て。", author: "アルベルト・アインシュタイン" },
      { text: "平和とは、争いのない状態ではなく、徳、真実、正義に従う気質である。", author: "バルーフ・スピノザ" },
      { text: "我思う、ゆえに我あり。", author: "ルネ・デカルト" },
      { text: "知ることは力なり。", author: "フランシス・ベーコン" },
      { text: "一日一善。", author: "ベンジャミン・フランクリン" },
      { text: "幸福になりたければ、幸福になろうとする努力をしなさい。", author: "ソクラテス" },
      { text: "他人のために生きてこそ、人生に価値がある。", author: "アルベルト・アインシュタイン" },
      { text: "時間こそ最も価値ある資源である。時間は再生不能だ。", author: "ピーター・ドラッカー" },
      { text: "好奇心のない人間は存在しているだけで、生きてはいない。", author: "ゴーテ" },
      { text: "われわれは自らが考えるところのものになる。", author: "マハトマ・ガンジー" },
      { text: "挑戦して失敗を恐れるより、何もしないことを恐れよ。", author: "本田宗一郎" },
      { text: "困難の中に機会がある。", author: "アルベルト・アインシュタイン" },
      { text: "継続は力なり。", author: "ナポレオン・ヒル" },
      { text: "過去は変えられない。しかし未来は今から変えられる。", author: "アルフレッド・アドラー" },
    ];

    function getHourlyIndex() {
      const now = new Date();
      // Use year + day of year + hour as seed to pick a quote that changes hourly
      const seed = now.getFullYear() * 100000 + getDayOfYear(now) * 24 + now.getHours();
      return seed % QUOTES.length;
    }

    function getDayOfYear(date) {
      const start = new Date(date.getFullYear(), 0, 0);
      const diff = date - start;
      const oneDay = 1000 * 60 * 60 * 24;
      return Math.floor(diff / oneDay);
    }

    function getMinutesToNextHour() {
      const now = new Date();
      const mins = 59 - now.getMinutes();
      const secs = 59 - now.getSeconds();
      return `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
    }

    function showQuote() {
      const idx = getHourlyIndex();
      const { text, author } = QUOTES[idx];

      const textEl = document.getElementById('quoteText');
      const authorEl = document.getElementById('quoteAuthor');
      const nameEl = document.getElementById('authorName');

      textEl.classList.remove('visible');
      authorEl.classList.remove('visible');

      setTimeout(() => {
        textEl.textContent = text;
        nameEl.textContent = '— ' + author;
        textEl.classList.add('visible');
        authorEl.classList.add('visible');
      }, 100);
    }

    function updateCountdown() {
      document.getElementById('nextUpdate').textContent = '次の更新まで ' + getMinutesToNextHour();
    }

    showQuote();
    updateCountdown();

    // Update countdown every second
    setInterval(updateCountdown, 1000);

    // Refresh quote at the top of each hour
    function scheduleNextHour() {
      const now = new Date();
      const msToNextHour = (60 - now.getMinutes()) * 60 * 1000 - now.getSeconds() * 1000 - now.getMilliseconds();
      setTimeout(() => {
        showQuote();
        scheduleNextHour();
      }, msToNextHour);
    }
    scheduleNextHour();
  </script>
</body>
</html>
